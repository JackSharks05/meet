# Cloudflare Tunnel config for the home server — exposes ONLY the public
# poll/respond API. The admin listener (:3003) is NOT here; it stays on Tailscale.
#
# Setup (on the Arch server):
#   cloudflared tunnel login
#   cloudflared tunnel create meet
#   cloudflared tunnel route dns meet api.meet.jackdehaan.com
#   # put the generated <TUNNEL_ID>.json credentials beside this file, then:
#   cloudflared tunnel --config ./config.yml run
#
# Replace <TUNNEL_ID> below with the id printed by `tunnel create`.

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  # Public poll/respond API → the MODE=public Go listener (localhost only).
  - hostname: api.meet.jackdehaan.com
    service: http://localhost:3002
  # Everything else is rejected.
  - service: http_status:404
